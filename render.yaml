# render.yaml — Configuración para Render.com (deploy automático del backend)
# Render lee este archivo desde la raíz del repo y crea el servicio solo.

services:
  - type: web
    name: datalab-api
    runtime: python
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /
    # Free tier: el servicio "duerme" tras 15 min de inactividad.
    # El primer request tarda ~30 s en despertar.
    # Para evitarlo, actualiza a Render Starter ($7/mes).
